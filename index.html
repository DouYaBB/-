<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>小辣鸡快来看</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf8ef;font-family:'Arial',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;user-select:none;-webkit-user-select:none}
.container{padding:20px;max-width:520px;width:100%}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
h1{font-size:52px;color:#776e65;font-weight:bold;line-height:1}
.top-right{display:flex;align-items:center;gap:10px}
.score-box{background:#bbada0;padding:8px 20px;border-radius:6px;color:#fff;text-align:center;font-weight:bold;font-size:13px;text-transform:uppercase;min-width:80px}
.score-box span{display:block;font-size:26px;margin-top:2px;color:#fff}
.btn{background:#8f7a66;color:#f9f6f2;border:none;border-radius:6px;padding:10px 22px;font-size:16px;font-weight:bold;cursor:pointer;transition:background .1s}
.btn:hover{background:#9f8b77}.btn:active{background:#7a6556}
.board-container{position:relative;background:#bbada0;border-radius:10px;padding:var(--gap);width:100%;aspect-ratio:1;--gap:15px;--cell-gap:15px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--cell-gap);width:100%;height:100%}
.cell{background:rgba(238,228,218,.35);border-radius:6px}
.tile-container{position:absolute;top:var(--gap);left:var(--gap);right:var(--gap);bottom:var(--gap);overflow:hidden}
.tile{position:absolute;display:flex;justify-content:center;align-items:center;font-weight:bold;border-radius:6px;z-index:1;transition:transform .12s ease;will-change:transform}
.tile-new .tile-inner{animation:tileAppear .2s ease}
.tile-merged .tile-inner{animation:tilePop .2s ease;z-index:2}
@keyframes tileAppear{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes tilePop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.tile-2{background:#eee4da;color:#776e65}
.tile-4{background:#ede0c8;color:#776e65}
.tile-8{background:#f2b179;color:#f9f6f2}
.tile-16{background:#f59563;color:#f9f6f2}
.tile-32{background:#f67c5f;color:#f9f6f2}
.tile-64{background:#f65e3b;color:#f9f6f2}
.tile-128{background:#edcf72;color:#f9f6f2}
.tile-256{background:#edcc61;color:#f9f6f2}
.tile-512{background:#edc850;color:#f9f6f2}
.tile-1024{background:#edc53f;color:#f9f6f2}
.tile-2048{background:#edc22e;color:#f9f6f2}
.tile-super{background:#3c3a32;color:#f9f6f2}
.tile-inner{display:flex;justify-content:center;align-items:center;width:100%;height:100%;border-radius:6px}
.overlay{position:absolute;inset:0;background:rgba(238,228,218,.7);display:none;justify-content:center;align-items:center;flex-direction:column;border-radius:10px;z-index:100;animation:fadeIn .5s ease}
.overlay.show{display:flex}
.overlay h2{font-size:48px;color:#776e65;margin-bottom:20px}
.overlay .sub{color:#776e65;font-size:16px;margin-bottom:15px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.footer{margin-top:12px;font-size:13px;color:#776e65;text-align:center}
.footer span{margin:0 10px;opacity:.4}
@media(max-width:520px){.container{padding:10px}h1{font-size:40px}.board-container{--gap:10px;--cell-gap:10px}.score-box{min-width:65px;padding:6px 14px;font-size:11px}.score-box span{font-size:20px}.btn{padding:8px 16px;font-size:14px}.overlay h2{font-size:36px}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>2048</h1>
    <div class="top-right">
      <div class="score-box">得分<span id="score">0</span></div>
      <button class="btn" id="newGameBtn">新游戏</button>
    </div>
  </div>
  <div class="board-container" id="boardContainer">
    <div class="grid" id="grid">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="tile-container" id="tileContainer"></div>
    <div class="overlay" id="overlay">
      <h2 id="overlayTitle">游戏结束!</h2>
      <div class="sub" id="overlaySub"></div>
      <button class="btn" id="overlayBtn">再来一局</button>
    </div>
  </div>
  <div class="footer">方向键<span>·</span>滑动操作</div>
</div>

<script>
const SIZE=4;
const GAP=15;
let grid=[],tileGrid=[],tiles=[],nextId=1,score=0,gameOver=false,won=false,moving=false;
const tileC=document.getElementById('tileContainer');
const scoreEl=document.getElementById('score');
const overlay=document.getElementById('overlay');
const overlayTitle=document.getElementById('overlayTitle');
const overlaySub=document.getElementById('overlaySub');

function cellSize(){
  const w=tileC.clientWidth;
  return (w-(SIZE-1)*GAP)/SIZE;
}

function px(r,c){
  const s=cellSize();
  return {x:c*(s+GAP),y:r*(s+GAP),s};
}

function tileClass(v){return 'tile '+(v<=2048?'tile-'+v:'tile-super')}

function fontSize(v){
  if(v<100) return '36px';
  if(v<1000) return '30px';
  if(v<10000) return '22px';
  return '18px';
}

function createTileEl(value,r,c){
  const id=nextId++;
  const el=document.createElement('div');
  const pos=px(r,c);
  el.style.width=pos.s+'px';
  el.style.height=pos.s+'px';
  el.style.transform='translate('+pos.x+'px,'+pos.y+'px)';
  el.className=tileClass(value);
  const inner=document.createElement('span');
  inner.className='tile-inner';
  inner.textContent=value;
  inner.style.fontSize=fontSize(value);
  el.appendChild(inner);
  tileC.appendChild(el);
  return {id,value,el,r,c,inner};
}

function addTile(value,r,c,opts){
  const tile=createTileEl(value,r,c);
  if(opts&&opts.isNew) tile.el.classList.add('tile-new');
  if(opts&&opts.merged) tile.el.classList.add('tile-merged');
  grid[r][c]=value;
  tileGrid[r][c]=tile;
  tiles.push(tile);
}

function clearBoard(){
  tiles.forEach(t=>t.el.remove());
  tiles=[];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){grid[r][c]=0;tileGrid[r][c]=null}
}

function randomEmpty(){
  const empty=[];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!grid[r][c]) empty.push({r,c});
  return empty.length?empty[Math.floor(Math.random()*empty.length)]:null;
}

function spawnTile(){
  const pos=randomEmpty();
  if(!pos) return;
  const v=Math.random()<.9?2:4;
  addTile(v,pos.r,pos.c,{isNew:true});
}

function slideLine(vals,tilesRefs){
  const items=[];
  for(let i=0;i<vals.length;i++) if(vals[i]) items.push({v:vals[i],t:tilesRefs[i]});
  const out=[];let add=0,i=0;
  while(i<items.length){
    if(i+1<items.length&&items[i].v===items[i+1].v){
      const nv=items[i].v*2;
      out.push({v:nv,t:items[i].t,consumed:items[i+1].t});
      add+=nv;i+=2;
    }else{out.push({v:items[i].v,t:items[i].t,consumed:null});i++}
  }
  while(out.length<SIZE) out.push({v:0,t:null,consumed:null});
  return {result:out,score:add};
}

function move(dir){
  if(gameOver||moving) return;
  const R=[0,1,2,3];
  const order={up:[R,R],down:[[3,2,1,0],[3,2,1,0]],left:[R,R],right:[R,[3,2,1,0]]};
  const tra=order[dir];
  const isRow=dir==='left'||dir==='right';
  let totalScore=0;
  const consumed=[];
  // Work on copies to compute before applying
  const ng=[],nt=[];
  for(let r=0;r<SIZE;r++){ng[r]=[...grid[r]];nt[r]=Array(SIZE).fill(null)}

  if(isRow){
    for(let r of tra[0]){
      const vals=tra[1].map(c=>grid[r][c]);
      const trefs=tra[1].map(c=>tileGrid[r][c]);
      const {result,score:ls}=slideLine(vals,trefs);
      totalScore+=ls;
      for(let j=0;j<SIZE;j++){
        const c=tra[1][j];
        ng[r][c]=result[j].v;
        if(result[j].t){
          nt[r][c]=result[j].t;
          result[j].t.r=r;result[j].t.c=c;
          result[j].t.nv=result[j].v;
          if(result[j].consumed) consumed.push(result[j].consumed);
        }
      }
    }
  }else{
    for(let c of tra[0]){
      const vals=tra[1].map(r=>grid[r][c]);
      const trefs=tra[1].map(r=>tileGrid[r][c]);
      const {result,score:ls}=slideLine(vals,trefs);
      totalScore+=ls;
      for(let j=0;j<SIZE;j++){
        const r=tra[1][j];
        ng[r][c]=result[j].v;
        if(result[j].t){
          nt[r][c]=result[j].t;
          result[j].t.r=r;result[j].t.c=c;
          result[j].t.nv=result[j].v;
          if(result[j].consumed) consumed.push(result[j].consumed);
        }
      }
    }
  }

  // Check if board changed
  let changed=false;
  for(let r=0;r<SIZE&&!changed;r++) for(let c=0;c<SIZE&&!changed;c++) if(grid[r][c]!==ng[r][c]) changed=true;
  if(!changed) return;

  score+=totalScore;
  scoreEl.textContent=score;
  moving=true;

  // Remove consumed tiles (they vanish while survivors slide)
  consumed.forEach(t=>{
    t.el.remove();
    const idx=tiles.indexOf(t);
    if(idx>-1) tiles.splice(idx,1);
  });

  // Apply new state to board
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){grid[r][c]=ng[r][c];tileGrid[r][c]=nt[r][c]}

  // Animate survivors: update position + value
  tiles.forEach(t=>{
    const p=px(t.r,t.c);
    t.el.style.transform='translate('+p.x+'px,'+p.y+'px)';
    if(t.nv!==undefined){
      t.el.className=tileClass(t.nv);
      t.inner.textContent=t.nv;
      t.inner.style.fontSize=fontSize(t.nv);
    }
  });

  // After slide animation ends
  setTimeout(()=>{
    tiles.forEach(t=>{
      if(t.nv!==undefined){
        t.el.classList.add('tile-merged');
        t.value=t.nv;delete t.nv;
      }
    });
    spawnTile();
    moving=false;
    checkState();
  },140);
}

function checkState(){
  if(!won) for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(grid[r][c]===2048){won=true;overlayTitle.textContent='🎉 你赢了!';overlaySub.textContent='继续挑战更高分数';overlay.classList.add('show');return}
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){if(!grid[r][c]) return;if(c<3&&grid[r][c]===grid[r][c+1]) return;if(r<3&&grid[r][c]===grid[r+1][c]) return}
  gameOver=true;overlayTitle.textContent='游戏结束';overlaySub.textContent='得分: '+score;overlay.classList.add('show');
}

function initGame(){
  grid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  tileGrid=Array.from({length:SIZE},()=>Array(SIZE).fill(null));
  tiles=[];nextId=1;score=0;gameOver=false;won=false;moving=false;
  tileC.innerHTML='';overlay.classList.remove('show');scoreEl.textContent='0';
  spawnTile();spawnTile();
}

document.addEventListener('keydown',e=>{
  const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};
  const d=map[e.key];if(d){e.preventDefault();move(d)}
});

let tx=0,ty=0;
document.addEventListener('touchstart',e=>{const t=e.touches[0];tx=t.clientX;ty=t.clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const t=e.changedTouches[0];const dx=t.clientX-tx,dy=t.clientY-ty;
  const ax=Math.abs(dx),ay=Math.abs(dy);
  if(Math.max(ax,ay)<20) return;
  if(ax>ay) move(dx>0?'right':'left');else move(dy>0?'down':'up');
},{passive:true});

document.getElementById('newGameBtn').addEventListener('click',initGame);
document.getElementById('overlayBtn').addEventListener('click',initGame);
initGame();
</script>
</body>
</html>
